<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>谈心谈话系统</title>
 
    <!-- 外部库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="public/js/anime.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
 
    <!-- 主样式入口 -->
    <link rel="stylesheet" href="public/css/main.css?v=2.0.0">
 
    <style>
        html, body.app-body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: #eef2f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            color: #2c3e50;
        }

        .app-shell {
            display: flex;
            height: 100vh;
            padding-left: 185px;
            box-sizing: border-box;
            transition: padding-left 0.2s ease;
        }
    </style>
</head>
 
<body class="app-body">
    <div class="app-shell">
        <!-- ==================== 侧边栏 ==================== -->
        <aside class="sidebar">
            <!-- 展开态头部：左侧 logo + 标题，右侧方形收起按钮 -->
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <i class="fas fa-comments sidebar-logo"></i>
                    <div class="sidebar-title-group">
                        <div class="sidebar-title">谈心谈话系统</div>
                        <div class="sidebar-subtitle">智能心理谈话平台</div>
                    </div>
                </div>
                <button id="sidebarCollapseBtn" class="sidebar-collapse-btn" title="收起侧栏">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <!-- 收起态头部：中央 logo（hover 时 logo 隐藏，显示方形展开按钮） -->
            <div class="sidebar-collapsed-header">
                <div class="collapsed-logo-area">
                    <i class="fas fa-comments"></i>
                </div>
                <button id="sidebarExpandBtn" class="sidebar-expand-btn" title="展开侧栏">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <div class="sidebar-menu" id="sidebarMenu">
                <!-- 谈心谈话 -->
                <div class="menu-section" data-section="interrogation">
                    <div class="menu-item menu-item-parent" data-action="select-section" data-section="interrogation">
                        <i class="fas fa-microphone menu-icon"></i>
                        <span class="menu-label">谈心谈话</span>
                        <button class="menu-add-btn" data-action="add-interrogation" title="新建谈话">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                    <div class="menu-children" id="interrogationList"></div>
                </div>

                <!-- 学生档案 -->
                <div class="menu-section" data-section="case">
                    <div class="menu-item menu-item-parent" data-action="select-section" data-section="case">
                        <i class="fas fa-user-graduate menu-icon"></i>
                        <span class="menu-label">学生档案</span>
                    </div>
                </div>
            </div>

            <!-- 收起态：方形图标按钮区（替代原文字菜单） -->
            <div class="sidebar-collapsed-menu">
                <div class="collapsed-section-group">
                    <button class="collapsed-item collapsed-section-item" data-action="collapsed-section" data-section="interrogation" title="谈心谈话">
                        <i class="fas fa-microphone"></i>
                        <span class="collapsed-tooltip">谈心谈话</span>
                    </button>
                    <button class="collapsed-item collapsed-section-item" data-action="collapsed-section" data-section="case" title="学生档案">
                        <i class="fas fa-user-graduate"></i>
                        <span class="collapsed-tooltip">学生档案</span>
                    </button>
                </div>
                <div class="collapsed-section-group" id="collapsedInterrogationList">
                    <!-- 收起态审讯子项由 JS 动态渲染 -->
                </div>
                <div class="collapsed-section-group collapsed-bottom-group">
                    <button class="collapsed-item collapsed-back-btn" title="返回首页" onclick="window.location.href='/'">
                        <i class="fas fa-home"></i>
                        <span class="collapsed-tooltip">返回首页</span>
                    </button>
                </div>
            </div>

            <!-- 返回首页按钮 -->
            <div class="sidebar-footer">
                <button class="sidebar-back-btn" onclick="window.location.href='/'">
                    <i class="fas fa-home"></i>
                    <span>返回首页</span>
                </button>
            </div>
        </aside>
 

 
        <!-- ==================== 主内容区 ==================== -->
        <main class="main-content">
            <!-- ==================== 谈心谈话视图 ==================== -->
            <div class="view view-interrogation active" id="viewInterrogation">
                <div class="interrogation-empty" id="interrogationEmpty">
                    <i class="fas fa-plus-circle"></i>
                    <p>请新建谈心谈话</p>
                </div>
                <div class="interrogation-grid" id="interrogationGrid">
                    <!-- 实时引导卡片（grid 横向两分区：左=标签+问题，右=原因） -->
                    <div class="interrogation-guide-card" id="guideCard">
                        <!-- 左侧翻页热区（绝对定位覆盖） -->
                        <div class="guide-nav-zone guide-nav-left" id="guideNavLeft">
                            <div class="guide-nav-glow"></div>
                        </div>
                        <!-- 左侧：标签 + 推荐问题 -->
                        <div class="guide-left" id="guideLeft">
                            <!-- 左上标签 -->
                            <div class="guide-tag" id="guideTag">心理状态</div>
                            <!-- 推荐问题 -->
                            <div class="guide-question" id="guideQuestion">
                                <i class="fas fa-comment-dots guide-question-placeholder"></i>
                            </div>
                        </div>
                        <!-- 右侧：原因说明 -->
                        <div class="guide-reason" id="guideReason">
                            <div class="guide-reason-label">原因</div>
                            <div class="guide-reason-text" id="guideReasonText">
                                <span class="guide-reason-placeholder">等待语音输入...</span>
                            </div>
                        </div>
                        <!-- 右侧翻页热区（绝对定位覆盖） -->
                        <div class="guide-nav-zone guide-nav-right" id="guideNavRight">
                            <div class="guide-nav-glow"></div>
                        </div>
                        <!-- 页码指示器 -->
                        <div class="guide-pagination" id="guidePagination">
                            <span class="guide-page-current">1</span>
                            <span class="guide-page-divider">/</span>
                            <span class="guide-page-total">1</span>
                        </div>
                    </div>

                    <!-- 中上：问题推荐 2 （保留占位，用于未来扩展） -->
                    <div class="interrogation-question-box interrogation-card-question interrogation-card-placeholder" id="workflow1-q2" style="display:none;">
                        <div class="interrogation-question-content" id="workflow1-q2-content">
                            <i class="fas fa-comment-dots interrogation-question-placeholder"></i>
                        </div>
                    </div>

                    <!-- 右侧（跨两行）：对话转写 -->
                    <div class="interrogation-card-soft interrogation-card-transcript">
                        <div class="interrogation-transcript-header-soft">
                            <span class="interrogation-soft-dot"></span>
                            <span>对话转写</span>
                        </div>
                        <div class="interrogation-transcript-content" id="interrogationTranscriptContent">
                            <div class="interrogation-transcript-placeholder">
                                <i class="fas fa-microphone-alt"></i>
                                <p>录音转写内容将显示在这里</p>
                            </div>
                        </div>
                    </div>

                    <!-- 左下：学生基本信息 + 近期情况 -->
                    <div class="interrogation-card-soft interrogation-card-student">
                        <h3 class="interrogation-card-title">基本信息</h3>
                        <div class="interrogation-student-row">
                            <i class="fas fa-user-graduate"></i>
                            <span>姓名: <span id="interrogationStudentName">请先选择学生</span></span>
                        </div>
                        <div class="interrogation-student-row">
                            <i class="fas fa-users"></i>
                            <span>区队: <span id="interrogationStudentTeam">-</span></span>
                        </div>
                        <div class="interrogation-student-row">
                            <i class="fas fa-id-badge"></i>
                            <span>学号: <span id="interrogationStudentId">-</span></span>
                        </div>
                        <div class="interrogation-student-row">
                            <i class="fas fa-university"></i>
                            <span>学院: <span id="interrogationStudentCollege">-</span></span>
                        </div>
                        <h3 class="interrogation-card-title">近期情况</h3>
                        <div class="interrogation-student-block">
                            <i class="fas fa-chart-line"></i>
                            <p id="interrogationStudentStatus">本学期前往心理辅导中心咨询三次<br>本月无督条<br>上学期绩点: 3.5</p>
                        </div>
                    </div>

                    <!-- 中下：对话要点 + 录音控制 + 完成按钮 -->
                    <div class="interrogation-card-soft interrogation-card-summary">
                        <!-- 标题 -->
                        <div class="interrogation-summary-title">
                            <span class="interrogation-summary-dot"></span>
                            对话要点
                            <span class="interrogation-summary-dot"></span>
                        </div>

                        <div class="interrogation-summary-list">
                            <div class="interrogation-summary-item interrogation-summary-item-blue">
                                <span class="interrogation-summary-item-dot"></span>
                                <span>近期学业压力较大，睡眠质量一般</span>
                            </div>
                            <div class="interrogation-summary-item interrogation-summary-item-green">
                                <span class="interrogation-summary-item-dot"></span>
                                <span>对未来有规划，但执行过程中感到迷茫</span>
                            </div>
                            <div class="interrogation-summary-item interrogation-summary-item-orange">
                                <span class="interrogation-summary-item-dot"></span>
                                <span>人际关系良好，但有时会感到孤独</span>
                            </div>
                        </div>

                        <!-- 录音控制 -->
                        <div class="interrogation-record-soft">
                            <div class="interrogation-mic-btn" id="interrogationMicBtn" title="点击开始录音">
                                <div class="interrogation-mic-ring"></div>
                                <i class="fas fa-microphone"></i>
                            </div>
                        </div>
                        <div class="interrogation-status-text" id="interrogationStatusText">点击麦克风开始录音</div>

                        <!-- 完成按钮 -->
                        <button class="interrogation-finish-btn" id="interrogationFinishBtn" title="完成谈话并保存记录">
                            <i class="fas fa-check"></i> 完成
                        </button>
                    </div>
                </div>
            </div>

            <!-- ==================== 学生档案视图 ==================== -->
            <div class="view view-case" id="viewCase">
                <div class="student-archive-container">
                    <div class="student-archive-header">
                        <h1><i class="fas fa-user-graduate"></i> 学生档案</h1>
                        <button class="student-add-btn" onclick="StudentArchiveManager.openStudentFormModal()" title="新增学生档案">
                            <i class="fas fa-plus"></i> 新增
                        </button>
                    </div>

                    <div class="student-grid" id="studentGrid">
                        <div class="case-loading">
                            <i class="fas fa-spinner fa-spin"></i>
                            <span>加载中...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ==================== 个人画像视图 ==================== -->
            <div class="view" id="viewProfile">
                <div class="profile-container">
                    <!-- 右上角：返回 + 导出 -->
                    <div class="profile-top-actions">
                        <button class="profile-export-btn" onclick="alert('导出报告功能开发中')">
                            <i class="fas fa-download"></i> 导出报告
                        </button>
                        <button class="profile-back-btn" onclick="navigateToView('case')">
                            <i class="fas fa-arrow-left"></i> 返回
                        </button>
                    </div>

                    <div class="profile-content" id="profileContent">
                        <div class="profile-empty">
                            <i class="fas fa-user-circle profile-empty-icon"></i>
                            <p class="profile-empty-text">请从学生档案中选择一个学生</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ==================== 新建谈心谈话视图 ==================== -->
            <div class="view view-start-conversation" id="viewStartConversation">
                <div class="start-conversation-container">
                    <div class="start-conversation-header">
                        <h2><i class="fas fa-plus-circle"></i> 新建</h2>
                        <button class="start-conversation-back" onclick="ConversationManager.closeStartModal()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="start-conversation-body">
                        <!-- 谈话类型 -->
                        <div class="conversation-field">
                            <label class="conversation-label"><i class="fas fa-tag"></i> 谈话类型 <span class="required">*</span></label>
                            <div class="conversation-type-options">
                                <label class="conversation-type-option">
                                    <input type="radio" name="conversationType" value="daily" checked>
                                    <span><i class="fas fa-comments"></i> 同学日常交流</span>
                                </label>
                                <label class="conversation-type-option">
                                    <input type="radio" name="conversationType" value="academic">
                                    <span><i class="fas fa-graduation-cap"></i> 学业情况谈心谈话</span>
                                </label>
                                <label class="conversation-type-option">
                                    <input type="radio" name="conversationType" value="psychology">
                                    <span><i class="fas fa-brain"></i> 心理状况谈心谈话</span>
                                </label>
                            </div>
                        </div>

                        <!-- 谈话人 -->
                        <div class="conversation-field">
                            <label class="conversation-label"><i class="fas fa-user-tie"></i> 谈话人 <span class="required">*</span></label>
                            <div class="conversation-interviewer-options">
                                <label class="conversation-interviewer-option">
                                    <input type="radio" name="interviewer" value="中队长" checked>
                                    <span>中队长</span>
                                </label>
                                <label class="conversation-interviewer-option">
                                    <input type="radio" name="interviewer" value="学业辅导员">
                                    <span>学业辅导员</span>
                                </label>
                                <label class="conversation-interviewer-option">
                                    <input type="radio" name="interviewer" value="心理副区">
                                    <span>心理副区</span>
                                </label>
                            </div>
                        </div>

                        <!-- 选择学生 -->
                        <div class="conversation-field">
                            <label class="conversation-label"><i class="fas fa-user-graduate"></i> 选择学生 <span class="required">*</span></label>
                            <div class="conversation-student-list" id="conversationStudentList">
                                <div class="conversation-student-loading">
                                    <i class="fas fa-spinner fa-spin"></i> 加载中...
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="start-conversation-footer">
                        <button class="start-conversation-btn start-conversation-btn-cancel" onclick="ConversationManager.closeStartModal()">
                            取消
                        </button>
                        <button class="start-conversation-btn start-conversation-btn-confirm" id="conversationStartConfirm" onclick="ConversationManager.confirmStart()">
                            <i class="fas fa-check"></i> 开始谈话
                        </button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- ==================== 学生信息采集弹窗 ==================== -->
    <div class="student-form-modal" id="studentFormModal">
        <div class="student-form-box">
            <div class="student-form-header">
                <h3><i class="fas fa-user-plus"></i> 新增学生档案</h3>
                <button class="student-form-close" onclick="StudentArchiveManager.closeStudentFormModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="student-form-body">
                <!-- 照片上传 -->
                <div class="student-form-row student-form-photo-row">
                    <label class="student-form-label">照片</label>
                    <div class="student-form-photo-area">
                        <div class="student-form-photo-preview" id="photoPreview">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="student-form-photo-controls">
                            <label class="student-form-photo-btn">
                                <i class="fas fa-upload"></i> 上传照片
                                <input type="file" id="photoFile" accept="image/*" style="display:none;">
                            </label>
                            <div class="student-form-photo-hint">建议尺寸 200x200，小于 2MB</div>
                        </div>
                    </div>
                </div>

                <!-- 姓名 + 区队 -->
                <div class="student-form-row student-form-row-2">
                    <div class="student-form-field">
                        <label class="student-form-label">姓名 <span class="required">*</span></label>
                        <input type="text" id="form-name" class="student-form-input" placeholder="请输入姓名" maxlength="50">
                    </div>
                    <div class="student-form-field">
                        <label class="student-form-label">区队 <span class="required">*</span></label>
                        <input type="text" id="form-team" class="student-form-input" placeholder="例如：2024级刑侦一区队" maxlength="100">
                    </div>
                </div>

                <!-- 学号 + 性别 -->
                <div class="student-form-row student-form-row-2">
                    <div class="student-form-field">
                        <label class="student-form-label">学号</label>
                        <input type="text" id="form-studentId" class="student-form-input" placeholder="请输入学号" maxlength="30">
                    </div>
                    <div class="student-form-field">
                        <label class="student-form-label">性别</label>
                        <div class="student-form-gender">
                            <label class="student-form-gender-option">
                                <input type="radio" name="form-gender" value="男" checked>
                                <span><i class="fas fa-mars"></i> 男</span>
                            </label>
                            <label class="student-form-gender-option">
                                <input type="radio" name="form-gender" value="女">
                                <span><i class="fas fa-venus"></i> 女</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 出生日期 -->
                <div class="student-form-row student-form-row-2">
                    <div class="student-form-field">
                        <label class="student-form-label">出生日期</label>
                        <input type="date" id="form-birthday" class="student-form-input" placeholder="YYYY-MM-DD">
                    </div>
                    <div class="student-form-field">
                        <label class="student-form-label">所属学院</label>
                        <input type="text" id="form-college" class="student-form-input" placeholder="例如：刑事侦查学院" maxlength="100">
                    </div>
                </div>

                <!-- 专业 + 生源地 -->
                <div class="student-form-row student-form-row-2">
                    <div class="student-form-field">
                        <label class="student-form-label">专业</label>
                        <input type="text" id="form-major" class="student-form-input" placeholder="例如：侦查学" maxlength="100">
                    </div>
                    <div class="student-form-field">
                        <label class="student-form-label">生源地</label>
                        <input type="text" id="form-origin" class="student-form-input" placeholder="例如：北京市海淀区" maxlength="100">
                    </div>
                </div>
            </div>
            <div class="student-form-footer">
                <button class="student-form-btn student-form-btn-secondary" onclick="StudentArchiveManager.closeStudentFormModal()">取消</button>
                <button class="student-form-btn student-form-btn-primary" onclick="StudentArchiveManager.submitStudentForm()">保存</button>
            </div>
        </div>
    </div>

    <!-- 新建谈心谈话页面已移至 main-content 内作为独立视图 -->

    <!-- ==================== 外部JS库 ==================== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="public/js/md5.js"></script>
    <script src="public/js/hmac-sha256.js"></script>
    <script src="public/js/HmacSHA1.js"></script>
    <script src="public/js/enc-base64-min.js"></script>
    <script src="public/js/recorder-manager.js"></script>
 
    <!-- ==================== 功能模块（按依赖顺序） ==================== -->
    <script src="public/js/modules/speech-recorder.js"></script>
    <script src="public/js/modules/speech-recognition.js"></script>
    <script src="public/js/modules/talkGuideManager.js"></script>
    <script src="public/js/modules/workflow2.js"></script>
    <script src="public/js/modules/export.js"></script>
    <script src="public/js/modules/workspace.js"></script>
    <script src="public/js/modules/sidebar.js?v=1.0.2"></script>
    <script src="public/js/modules/studentArchive.js"></script>
    <script src="public/js/modules/conversation.js"></script>
    <script src="public/js/modules/app.js"></script>
</body>
</html>
