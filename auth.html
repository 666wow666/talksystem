<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>云讯智警</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="public/js/anime.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8f4f8 50%, #f0f8ff 100%);
            color: #333;
            min-height: 100vh;
            position: relative;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #1e3a5f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            overflow: hidden;
        }

        #splash-screen::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.3) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: splashGlow 3s ease-in-out infinite;
        }

        @keyframes splashGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        #splash-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #splash-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .splash-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .splash-icon {
            width: 50vmin;
            height: 50vmin;
            margin-bottom: 40px;
        }

        .splash-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .splash-title {
            font-size: 72px;
            font-weight: 900;
            margin-bottom: 50px;
            letter-spacing: 16px;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #ffffff;
            text-shadow: 
                1px 1px 2px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(100, 150, 255, 0.4);
            -webkit-text-stroke: 0.5px rgba(100, 150, 255, 0.3);
        }

        @keyframes titleShimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.9; }
        }

        .splash-title span {
            display: inline-block;
            color: #ffffff;
            text-shadow: 
                1px 1px 2px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(100, 150, 255, 0.4);
            -webkit-text-stroke: 0.5px rgba(100, 150, 255, 0.3);
        }

        .auth-btn {
            margin-top: 40px;
            padding: 14px 40px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.2));
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            backdrop-filter: blur(4px);
            box-shadow: 
                0 0 20px rgba(100,200,255,0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            letter-spacing: 4px;
        }

        .auth-btn:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.3));
            transform: scale(1.05);
            box-shadow: 
                0 0 30px rgba(100,200,255,0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .auth-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 58, 95, 0.9);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .auth-modal.active {
            display: flex;
        }

        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .auth-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.3s;
        }

        .auth-close:hover {
            color: #ef4444;
        }

        .auth-box h2 {
            font-size: 22px;
            color: #1e3a5f;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .auth-box input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .auth-box input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .auth-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        .auth-box button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .auth-box button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .auth-error {
            display: none;
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            padding: 10px;
            background: #fef2f2;
            border-radius: 8px;
            border: 1px solid #fecaca;
        }

        .auth-error.show {
            display: block;
        }

        .auth-loading {
            display: none;
            margin-top: 12px;
            color: #3b82f6;
            font-size: 13px;
        }

        .auth-loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div id="splash-screen">
        <canvas id="splash-canvas"></canvas>
        <div class="splash-content">
            <div class="splash-icon">
                <img src="public/image/splash-logo-small.png" alt="Logo">
            </div>
            <div class="splash-title">
                <span>云</span><span>讯</span><span>智</span><span>警</span>
            </div>
            <div class="splash-title-fallback" style="display: none; font-size: 48px; font-weight: 900; letter-spacing: 8px; color: white; text-shadow: 0 0 30px rgba(96, 165, 250, 0.8);">云讯智警</div>
            <button class="auth-btn" id="authBtn">认证</button>
        </div>
    </div>

    <div class="auth-modal" id="authModal">
        <div class="auth-box">
            <span class="auth-close" id="authClose">&times;</span>
            <h2>请输入授权码</h2>
            <input type="password" id="authKey" placeholder="请输入Key" autocomplete="off">
            <button id="authSubmit">确认</button>
            <p class="auth-loading" id="authLoading">验证中...</p>
            <p class="auth-error" id="authError">Key不正确，请重试</p>
        </div>
    </div>

    <script>
        var isAnimating = true;
        var animationId;
        var particles = [];
        var canvas, ctx;

        function initCanvas() {
            canvas = document.getElementById('splash-canvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            createParticles();
            animateParticles();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticles() {
            particles = [];
            var particleCount = 50;
            for (var i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    radius: Math.random() * 2 + 1,
                    alpha: Math.random() * 0.5 + 0.2
                });
            }
        }

        function animateParticles() {
            if (!isAnimating) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(96, 165, 250, ' + p.alpha + ')';
                ctx.fill();
            }
            
            for (var i = 0; i < particles.length; i++) {
                for (var j = i + 1; j < particles.length; j++) {
                    var dx = particles[i].x - particles[j].x;
                    var dy = particles[i].y - particles[j].y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = 'rgba(96, 165, 250, ' + (1 - dist / 150) * 0.3 + ')';
                        ctx.stroke();
                    }
                }
            }
            
            animationId = requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', resizeCanvas);

        window.addEventListener('load', function() {
            initCanvas();
            
            var splashScreen = document.getElementById('splash-screen');
            
            anime({
                targets: '.splash-icon',
                scale: [0, 1],
                opacity: [0, 1],
                duration: 1000,
                easing: 'easeOutElastic(1, .8)'
            });

            anime({
                targets: '.splash-title span',
                opacity: [0, 1],
                translateY: [50, 0],
                delay: anime.stagger(200, {start: 500}),
                duration: 800,
                easing: 'easeOutCubic'
            });

            anime({
                targets: '.auth-btn',
                opacity: [0, 1],
                translateY: [20, 0],
                duration: 600,
                delay: 1800,
                easing: 'easeOutCubic'
            });

            setTimeout(function() {
                var spans = document.querySelectorAll('.splash-title span');
                var allHidden = true;
                for (var i = 0; i < spans.length; i++) {
                    if (parseFloat(getComputedStyle(spans[i]).opacity) > 0) {
                        allHidden = false;
                        break;
                    }
                }
                if (allHidden) {
                    document.querySelector('.splash-title').style.display = 'none';
                    document.querySelector('.splash-title-fallback').style.display = 'block';
                }
            }, 3000);
        });

        document.getElementById('authBtn').addEventListener('click', function() {
            document.getElementById('authModal').classList.add('active');
            document.getElementById('authKey').focus();
        });

        document.getElementById('authClose').addEventListener('click', function() {
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('authKey').value = '';
            document.getElementById('authError').classList.remove('show');
        });

        document.getElementById('authSubmit').addEventListener('click', doAuth);

        document.getElementById('authKey').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doAuth();
            }
        });

        /**
         * 执行认证逻辑
         * 通过后端API验证密码，避免在前端暴露密码
         */
        async function doAuth() {
            var key = document.getElementById('authKey').value.trim();
            
            if (!key) {
                document.getElementById('authError').classList.add('show');
                return;
            }

            var submitBtn = document.getElementById('authSubmit');
            var loading = document.getElementById('authLoading');
            var error = document.getElementById('authError');

            submitBtn.disabled = true;
            loading.classList.add('show');
            error.classList.remove('show');

            try {
                const response = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password: key })
                });

                const result = await response.json();

                if (result.success) {
                    clearAllSessionData();
                    localStorage.setItem('authed', 'true');
                    localStorage.removeItem('basicInfoFilled');
                    window.location.href = 'data-collect.html?authed=1';
                } else {
                    error.classList.add('show');
                    anime({
                        targets: '#authKey',
                        translateX: [-10, 10, -10, 10, 0],
                        duration: 300,
                        easing: 'easeInOutSine'
                    });
                    document.getElementById('authKey').value = '';
                }
            } catch (err) {
                error.textContent = '网络错误，请稍后重试';
                error.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                loading.classList.remove('show');
            }
        }

        function clearAllSessionData() {
            localStorage.removeItem('authed');
            localStorage.removeItem('basicInfoFilled');
            localStorage.removeItem('basicInfo');
            localStorage.removeItem('workflow1History');
        }

        window.addEventListener('load', function() {
            clearAllSessionData();
        });
    </script>
</body>
</html>
